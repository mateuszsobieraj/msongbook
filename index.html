<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mSongbook - Your songbook</title>
    <link rel="icon" href="assets/banjo.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7b1323 0%, #4b0b0f 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .brand { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .brand-left { display:flex; align-items:center; gap:10px; }
        .brand-right { display:flex; align-items:center; }
        .logo { width:40px; height:40px; }
        /* header search styling */
        .header-search { display:flex; align-items:center; gap:8px; }
                .header-search input { width: 260px; max-width: 40vw; padding:8px 10px; border-radius:18px; }
                @media (max-width:600px) { .logo { width:34px; height:34px; } .header-search input { width:60px; } .header-search input:focus { width:180px; } }


        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 20px;
            font-size: 0.95rem;
            transition: width 0.25s ease, border-color 0.3s;
        }
        /* Mobile: collapsed search input that expands on focus */
        @media (max-width: 600px) {
            .search-box input { width: 40px; padding: 10px; }
                    .search-box input:focus { width: calc(100% - 120px); }
        }
        .segment { display: inline-block; vertical-align: top; white-space: pre; }
        .segment .chord { display: block; text-align: left; font-weight: 700; font-family: 'Courier New', monospace; color: #2b2b2b; }
        .segment .lyric { display: block; }
        .line { margin-bottom: 6px; }
        .song-detail .chords { white-space: normal; }

        /* Chords-only view styling */
        .chords-only-line { font-family: 'Courier New', monospace; color: #111; font-weight:700; padding: 6px 0; }
        .chords-only-line.empty { height: 12px; }
        @media (max-width:600px) { .chords-only-line { font-size: 1.05rem; } }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #5568d3;
        }

        .song-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .song-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .song-card h3 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .song-card p {
            color: #666;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .song-detail {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .song-detail.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .song-detail h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .song-detail .artist {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        .song-detail .chords {
            background: #fefefe;
            padding: 18px 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.7;
            color: #111;
            border-left: 4px solid #667eea;
            font-size: 1.05rem;
        }

                /* Focused/song-open view: hide search and emphasize lyrics */
                body.song-open .header-search { display: none; }
                body.song-open header { padding: 8px 0; }
                body.song-open header h1 { font-size: 1.6rem; }
                body.song-open .song-detail { margin-top: 6px; }
                body.song-open .song-detail .chords { font-size: 1.25rem; line-height: 1.9; padding: 22px; }
                @media (max-width:600px) {
                    body.song-open .song-detail .chords { font-size: 1.35rem; padding: 18px; }
                }

        /* Mobile optimizations */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .container { padding: 0 6px; }
            header h1 { font-size: 1.8rem; }
            .song-card h3 { font-size: 1.05rem; }
            .song-detail { padding: 20px; }
            .song-detail .chords { font-size: 1.15rem; line-height: 1.6; padding: 18px; }
            .search-box input { padding: 12px; font-size: 1rem; }
        }

        .back-button {
            /* Back button hidden until a song is open */
            display: none;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .back-button.active {
            display: inline-block;
        }

        .back-button:hover {
            background: #5568d3;
        }

        /* Control buttons: hidden by default, show when active (song view) */
        .control-button {
            display: none;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
            margin-left: 8px;
        }

        .control-button.active {
            display: inline-block;
        }

        .control-button:hover {
            background: #5568d3;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <div class="brand-left">
                    <img src="assets/banjo.svg" alt="banjo" class="logo">
                    <h1>mSongbook</h1>
                </div>
                <div class="brand-right">
                    <div class="search-box header-search">
                        <input type="text" id="searchInput" placeholder="Search by title or artist..." autocomplete="off">
                        <button onclick="app.search()">Search</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="controls"></div>

        <button class="back-button" id="backButton" onclick="app.showList()">← Back to list</button>
        <button class="control-button" id="toggleChords" onclick="app.toggleChords()">Show chords</button>
        <button class="control-button" id="onlyChordsBtn" onclick="app.toggleOnlyChords()">Chords only</button>

        <div id="listView">
            <div id="songList" class="song-list"></div>
            <div id="noResults" class="no-results" style="display: none;">
                No results. Try a different query.
            </div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <h2>🎼 Your songbook is empty</h2>
                <p>Add your first songs in ChordPro format</p>
            </div>
        </div>

        <div id="detailView" class="song-detail">
            <h2 id="songTitle"></h2>
            <p class="artist" id="songArtist"></p>
            <div class="chords" id="songChords"></div>
        </div>
    </div>

    <script>
        const app = {
            songs: [],
            currentSong: null,
            showChordSymbols: false,
            showOnlyChords: false,

            init() {
                this.loadSongs();
                this.render();
                
                // Enter key support
                document.getElementById('searchInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.search();
                });
            },

            loadSongs() {
                // Try to load a manifest from songs/index.json; fall back to localStorage or demo data
                fetch('songs/index.json').then(res => {
                    if (!res.ok) throw new Error('No manifest');
                    return res.json();
                }).then(list => {
                    this.songs = list.map((s, idx) => ({
                        id: s.id || idx + 1,
                        filename: s.filename,
                        title: s.title || s.filename.replace(/_/g, ' ').replace(/\.chordpro$/i, ''),
                        artist: s.artist || ''
                    }));
                    // cache for offline use
                    localStorage.setItem('songs', JSON.stringify(this.songs));
                    this.render();
                }).catch(() => {
                    const stored = localStorage.getItem('songs');
                    if (stored) {
                        this.songs = JSON.parse(stored);
                        this.render();
                    } else {
                        // Demo songs fallback
                        this.songs = [
                            {
                                id: 1,
                                title: 'Sample song',
                                artist: 'Artist 1',
                                chords: `Intro: [D] [A] [D]

[D]Pierwszy wers
[A]Jakiś tekst
[D]Z akordami

Chorus:
[G]Refren [D]jest super
[A]Wszyscy [D]śpiewają`
                            },
                            {
                                id: 2,
                                title: 'Second song',
                                artist: 'Artist 2',
                                chords: `[Em]Wers [Am]pierwszy
[D]Drugi [G]wers
[C]Trzeci [B]wers

Chorus:
[Em]La la [Am]la
[D]La la [G]la`
                            }
                        ];
                    }
                });
            },


            search() {
                const query = document.getElementById('searchInput').value.toLowerCase();
                
                if (!query) {
                    this.render();
                    return;
                }

                const filtered = this.songs.filter(song => 
                    song.title.toLowerCase().includes(query) ||
                    song.artist.toLowerCase().includes(query)
                );

                this.renderList(filtered);
            },

            showSong(id) {
                this.currentSong = this.songs.find(s => s.id === id);
                if (!this.currentSong) return;

                const display = (textToShow) => {
                    document.getElementById('songTitle').textContent = this.currentSong.title;
                    document.getElementById('songArtist').textContent = this.currentSong.artist;

                    // If user requested chords-only view, render chords-only; otherwise show full or parsed text
                    if (this.showOnlyChords && this.currentSong && this.currentSong.rawChords) {
                        document.getElementById('songChords').innerHTML = this.renderChordsOnly(this.currentSong.rawChords);
                    } else {
                        document.getElementById('songChords').textContent = textToShow;
                    }

                    document.getElementById('listView').style.display = 'none';
                    document.getElementById('detailView').classList.add('active');
                    document.getElementById('backButton').classList.add('active');
                    // Add class so header/search are hidden and lyrics are emphasized
                    document.body.classList.add('song-open');
                    // Activate toggle buttons (show in song view)
                    const toggleBtn = document.getElementById('toggleChords');
                    if (toggleBtn) {
                        toggleBtn.classList.add('active');
                        toggleBtn.textContent = this.showChordSymbols ? 'Hide chords' : 'Show chords';
                    }
                    const onlyBtn = document.getElementById('onlyChordsBtn');
                    if (onlyBtn) {
                        onlyBtn.classList.add('active');
                        onlyBtn.textContent = this.showOnlyChords ? 'Hide chords-only' : 'Chords only';
                    }
                };

                const chooseAndDisplay = () => {
                    const textToShow = (this.showChordSymbols && this.currentSong.rawChords) ? this.currentSong.rawChords : (this.currentSong.chords || 'No content');
                    display(textToShow);
                };

                if (this.currentSong.chords && !this.currentSong.rawChords) {
                    // already parsed-only stored; no raw available
                    chooseAndDisplay();
                    return;
                }

                if (this.currentSong.rawChords) {
                    // we already fetched raw content earlier
                    chooseAndDisplay();
                    return;
                }

                if (this.currentSong.filename) {
                    fetch('songs/' + this.currentSong.filename).then(res => {
                        if (!res.ok) throw new Error('Failed to load');
                        return res.text();
                    }).then(text => {
                        // Store both raw and parsed forms
                        this.currentSong.rawChords = text;
                        this.currentSong.chords = this.parseChordPro(text);
                        chooseAndDisplay();
                    }).catch(() => {
                        display('Unable to load song content.');
                    });
                } else {
                    chooseAndDisplay();
                }
            },


            showList() {
                    this.currentSong = null;
                document.getElementById('listView').style.display = 'block';
                document.getElementById('detailView').classList.remove('active');
                document.getElementById('backButton').classList.remove('active');
                // Remove focused class so header/search reappear and normal layout returns
                document.body.classList.remove('song-open');
                    // Hide chord control buttons when returning to list
                    const toggleBtn = document.getElementById('toggleChords');
                    if (toggleBtn) { toggleBtn.classList.remove('active'); toggleBtn.textContent = 'Show chords'; }
                    const onlyBtn = document.getElementById('onlyChordsBtn');
                    if (onlyBtn) { onlyBtn.classList.remove('active'); onlyBtn.textContent = 'Chords only'; }
                    // Reset flags
                    this.showOnlyChords = false;
                    this.showChordSymbols = false;
                    document.getElementById('searchInput').value = '';
                    this.render();
            },

            renderList(songs = this.songs) {
                const listView = document.getElementById('listView');
                const songList = document.getElementById('songList');
                const noResults = document.getElementById('noResults');
                const emptyState = document.getElementById('emptyState');

                if (songs.length === 0) {
                    songList.innerHTML = '';
                    if (document.getElementById('searchInput').value) {
                        noResults.style.display = 'block';
                        emptyState.style.display = 'none';
                    } else {
                        noResults.style.display = 'none';
                        emptyState.style.display = 'block';
                    }
                    return;
                }

                noResults.style.display = 'none';
                emptyState.style.display = 'none';

                songList.innerHTML = songs.map(song => `
                    <div class="song-card" onclick="app.showSong(${song.id})">
                        <h3>${this.escapeHtml(song.title)}</h3>
                        <p>${this.escapeHtml(song.artist)}</p>
                    </div>
                `).join('');
            },

            render() {
                this.renderList();
            },

            toggleChords() {
                this.showChordSymbols = !this.showChordSymbols;
                const btn = document.getElementById('toggleChords');
                if (btn) btn.textContent = this.showChordSymbols ? 'Hide chords' : 'Show chords';

                // If chords-only mode is active, keep it (toggle affects raw vs parsed when not chords-only)
                if (this.currentSong) {
                    if (this.showOnlyChords) {
                        // re-render chords-only from raw (raw preferred)
                        if (this.currentSong.rawChords) {
                            document.getElementById('songChords').innerHTML = this.renderChordsOnly(this.currentSong.rawChords);
                        }
                    } else {
                        const textToShow = (this.showChordSymbols && this.currentSong.rawChords) ? this.currentSong.rawChords : (this.currentSong.chords || 'No content');
                        document.getElementById('songChords').textContent = textToShow;
                    }
                }
            },

            toggleOnlyChords() {
                this.showOnlyChords = !this.showOnlyChords;
                const btn = document.getElementById('onlyChordsBtn');
                if (btn) btn.textContent = this.showOnlyChords ? 'Hide chords-only' : 'Chords only';

                if (this.currentSong) {
                    if (this.showOnlyChords && this.currentSong.rawChords) {
                        document.getElementById('songChords').innerHTML = this.renderChordsOnly(this.currentSong.rawChords);
                    } else {
                        // revert to normal display (respect showChordSymbols)
                        const textToShow = (this.showChordSymbols && this.currentSong.rawChords) ? this.currentSong.rawChords : (this.currentSong.chords || 'No content');
                        document.getElementById('songChords').textContent = textToShow;
                    }
                }
            },

            renderChordsOnly(rawText) {
                if (!rawText) return '';
                // For each line, extract chord tokens [C], [G7] and join them with spaces preserving line order
                const lines = rawText.replace(/\r/g,'').split('\n');
                const out = lines.map(line => {
                    const matches = [];
                    let m;
                    const re = /\[([^\]]+)\]/g;
                    while ((m = re.exec(line)) !== null) {
                        matches.push(m[1].trim());
                    }
                    return matches.join(' ');
                });
                // Render only non-empty chord lines (but keep empty lines for spacing)
                return out.map(l => l ? `<div class="chords-only-line">${this.escapeHtml(l)}</div>` : '<div class="chords-only-line empty"></div>').join('');
            },

            parseChordPro(text) {
                if (!text) return '';
                // Remove ChordPro directives in braces {meta: ...} and chords in brackets [C], [G7] etc.
                let t = text.replace(/\{[^}]*\}/g, '');
                t = t.replace(/\[[^\]]*\]/g, '');
                // Normalize newlines and remove excessive empty lines
                t = t.replace(/\r/g, '');
                t = t.replace(/\n{3,}/g, '\n\n');
                // Trim trailing whitespace on lines and overall
                t = t.split('\n').map(l => l.replace(/\s+$/,'' )).join('\n');
                return t.trim();
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };

        // Initialize app when page loads
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
