<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mSongbook - Twój Śpiewnik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #5568d3;
        }

        .song-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .song-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
        }

        .song-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .song-card h3 {
            color: #667eea;
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .song-card p {
            color: #666;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .song-detail {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .song-detail.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .song-detail h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .song-detail .artist {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        .song-detail .chords {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.8;
            color: #333;
            border-left: 4px solid #667eea;
        }

        .back-button {
            display: none;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .back-button.active {
            display: inline-block;
        }

        .back-button:hover {
            background: #5568d3;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 mSongbook</h1>
            <p>Twój osobisty śpiewnik - szukaj i śpiewaj!</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Szukaj po tytule lub artyście..."
                    autocomplete="off"
                >
                <button onclick="app.search()">Szukaj</button>
            </div>
        </div>

        <button class="back-button" id="backButton" onclick="app.showList()">← Wróć do listy</button>

        <div id="listView">
            <div id="songList" class="song-list"></div>
            <div id="noResults" class="no-results" style="display: none;">
                Brak wyników wyszukiwania. Spróbuj innego hasła.
            </div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <h2>🎼 Twój śpiewnik jest pusty</h2>
                <p>Dodaj swoje pierwsze piosenki w formacie ChordPro</p>
            </div>
        </div>

        <div id="detailView" class="song-detail">
            <h2 id="songTitle"></h2>
            <p class="artist" id="songArtist"></p>
            <div class="chords" id="songChords"></div>
        </div>
    </div>

    <script>
        const app = {
            songs: [],
            currentSong: null,

            init() {
                this.loadSongs();
                this.render();
                
                // Enter key support
                document.getElementById('searchInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.search();
                });
            },

            loadSongs() {
                // Try to load a manifest from songs/index.json; fall back to localStorage or demo data
                fetch('songs/index.json').then(res => {
                    if (!res.ok) throw new Error('No manifest');
                    return res.json();
                }).then(list => {
                    this.songs = list.map((s, idx) => ({
                        id: s.id || idx + 1,
                        filename: s.filename,
                        title: s.title || s.filename.replace(/_/g, ' ').replace(/\.chordpro$/i, ''),
                        artist: s.artist || ''
                    }));
                    // cache for offline use
                    localStorage.setItem('songs', JSON.stringify(this.songs));
                    this.render();
                }).catch(() => {
                    const stored = localStorage.getItem('songs');
                    if (stored) {
                        this.songs = JSON.parse(stored);
                        this.render();
                    } else {
                        // Demo songs fallback
                        this.songs = [
                            {
                                id: 1,
                                title: 'Przykładowa piosenka',
                                artist: 'Artysta 1',
                                chords: `Intro: [D] [A] [D]

[D]Pierwszy wers
[A]Jakiś tekst
[D]Z akordami

Chorus:
[G]Refren [D]jest super
[A]Wszyscy [D]śpiewają`
                            },
                            {
                                id: 2,
                                title: 'Druga piosenka',
                                artist: 'Artysta 2',
                                chords: `[Em]Wers [Am]pierwszy
[D]Drugi [G]wers
[C]Trzeci [B]wers

Chorus:
[Em]La la [Am]la
[D]La la [G]la`
                            }
                        ];
                    }
                });
            },


            search() {
                const query = document.getElementById('searchInput').value.toLowerCase();
                
                if (!query) {
                    this.render();
                    return;
                }

                const filtered = this.songs.filter(song => 
                    song.title.toLowerCase().includes(query) ||
                    song.artist.toLowerCase().includes(query)
                );

                this.renderList(filtered);
            },

            showSong(id) {
                this.currentSong = this.songs.find(s => s.id === id);
                if (!this.currentSong) return;

                const display = (chordsText) => {
                    document.getElementById('songTitle').textContent = this.currentSong.title;
                    document.getElementById('songArtist').textContent = this.currentSong.artist;
                    document.getElementById('songChords').textContent = chordsText;

                    document.getElementById('listView').style.display = 'none';
                    document.getElementById('detailView').classList.add('active');
                    document.getElementById('backButton').classList.add('active');
                };

                if (this.currentSong.chords) {
                    display(this.currentSong.chords);
                    return;
                }

                if (this.currentSong.filename) {
                    fetch('songs/' + this.currentSong.filename).then(res => {
                        if (!res.ok) throw new Error('Failed to load');
                        return res.text();
                    }).then(text => {
                        this.currentSong.chords = text;
                        display(text);
                    }).catch(() => {
                        display('Nie można załadować treści piosenki.');
                    });
                } else {
                    display(this.currentSong.chords || 'Brak treści');
                }
            },


            showList() {
                this.currentSong = null;
                document.getElementById('listView').style.display = 'block';
                document.getElementById('detailView').classList.remove('active');
                document.getElementById('backButton').classList.remove('active');
                document.getElementById('searchInput').value = '';
                this.render();
            },

            renderList(songs = this.songs) {
                const listView = document.getElementById('listView');
                const songList = document.getElementById('songList');
                const noResults = document.getElementById('noResults');
                const emptyState = document.getElementById('emptyState');

                if (songs.length === 0) {
                    songList.innerHTML = '';
                    if (document.getElementById('searchInput').value) {
                        noResults.style.display = 'block';
                        emptyState.style.display = 'none';
                    } else {
                        noResults.style.display = 'none';
                        emptyState.style.display = 'block';
                    }
                    return;
                }

                noResults.style.display = 'none';
                emptyState.style.display = 'none';

                songList.innerHTML = songs.map(song => `
                    <div class="song-card" onclick="app.showSong(${song.id})">
                        <h3>${this.escapeHtml(song.title)}</h3>
                        <p>${this.escapeHtml(song.artist)}</p>
                    </div>
                `).join('');
            },

            render() {
                this.renderList();
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };

        // Initialize app when page loads
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
